<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内提案ボックス | UFAS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-badge">UFAS Internal</div>
      <h1>社内提案ボックス</h1>
      <p>匿名で気軽に意見・提案を投稿できます。名前は記録されません。</p>
    </header>

    <section class="form-section">
      <h2>新しい投稿</h2>
      <form id="proposal-form">
        <div class="field">
          <label for="category">カテゴリ</label>
          <select id="category" required>
            <option value="">選択してください</option>
            <option value="業務改善">業務改善</option>
            <option value="職場環境">職場環境</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field">
          <label for="content">内容</label>
          <textarea id="content" rows="4" placeholder="ここに意見・提案を書いてください" required></textarea>
        </div>
        <button type="submit" id="submit-btn">送信する</button>
        <p id="form-message" class="form-message"></p>
      </form>
    </section>

    <section class="list-section">
      <h2>みんなの投稿</h2>
      <div id="proposals-list">
        <p class="loading">読み込み中...</p>
      </div>
    </section>
  </div>

  <footer>
    <button class="admin-link" onclick="openAdminModal()">.</button>
  </footer>

  <!-- 管理者モーダル -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal">
      <h3>管理者メニュー</h3>
      <input type="password" id="admin-password" placeholder="パスワードを入力" />
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeAdminModal()">キャンセル</button>
        <button class="btn-reset" onclick="resetProposals()">全件削除</button>
      </div>
      <p class="modal-message" id="modal-message"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
